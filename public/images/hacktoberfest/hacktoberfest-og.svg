<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#fbbf24" stroke-width="1" opacity="0.08"/>
      <line x1="0" y1="0" x2="40" y2="0" stroke="#fbbf24" stroke-width="1" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top badges -->
  <rect x="80" y="70" width="220" height="44" rx="22" fill="#d97706" opacity="0.9"/>
  <text x="102" y="100" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc">HACKTOBERFEST</text>

  <rect x="320" y="70" width="212" height="44" rx="22" fill="#fbbf24" opacity="0.8"/>
  <text x="342" y="100" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#0f172a">OCT 1-7, 2026</text>

  <!-- Day count badge, top-right -->
  <rect x="1020" y="70" width="100" height="44" rx="22" fill="#d97706" opacity="0.7"/>
  <text x="1070" y="100" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc" text-anchor="middle">7 Days</text>

  <!-- Git-branch illustration, low-opacity, right side -->
  <g opacity="0.15">
    <!-- Main branch vertical -->
    <line x1="1020" y1="240" x2="1020" y2="540" stroke="#fbbf24" stroke-width="3"/>
    <circle cx="1020" cy="260" r="10" fill="#fbbf24"/>
    <circle cx="1020" cy="340" r="10" fill="#fbbf24"/>
    <circle cx="1020" cy="420" r="10" fill="#fbbf24"/>
    <circle cx="1020" cy="500" r="10" fill="#fbbf24"/>

    <!-- Feature branch curves off -->
    <path d="M 1020 340 Q 1020 380 1070 390 L 1120 390" stroke="#d97706" stroke-width="3" fill="none"/>
    <circle cx="1120" cy="390" r="10" fill="#d97706"/>

    <path d="M 1020 420 Q 1020 460 1070 470 L 1120 470" stroke="#d97706" stroke-width="3" fill="none"/>
    <circle cx="1120" cy="470" r="10" fill="#d97706"/>
  </g>

  <!-- Title -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#f8fafc">Hacktoberfest</text>
  <text x="80" y="360" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#fbbf24">2026</text>

  <!-- Tagline -->
  <text x="80" y="420" font-family="Arial, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">7-Day DevOps Contribution Challenge</text>

  <!-- Feature bullets -->
  <g transform="translate(80, 460)">
    <circle cx="10" cy="10" r="5" fill="#10b981"/>
    <text x="28" y="16" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">No coding required</text>

    <circle cx="255" cy="10" r="5" fill="#fbbf24"/>
    <text x="273" y="16" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">Beginner friendly</text>

    <circle cx="480" cy="10" r="5" fill="#d97706"/>
    <text x="498" y="16" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8">Profile on the site</text>
  </g>

  <!-- Bottom branding -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fbbf24">DevOps Daily</text>
  <text x="80" y="595" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#fbbf24" opacity="0.7">Open Source Contribution Challenge</text>
</svg>
