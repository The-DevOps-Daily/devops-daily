<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#fbbf24" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- left amber accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#d97706"/>

  <!-- monospace section label -->
  <text x="80" y="140" font-family="Menlo, Monaco, monospace" font-size="22" fill="#fbbf24">// tools / kubernetes</text>

  <!-- category chip (top right) -->
  <rect x="920" y="100" width="200" height="40" rx="8" fill="#d97706" opacity="0.15" stroke="#d97706" stroke-opacity="0.4" stroke-width="1"/>
  <text x="1020" y="127" font-family="Menlo, Monaco, monospace" font-size="18" fill="#fbbf24" text-anchor="middle">Kubernetes</text>

  <!-- Title -->
  <text x="80" y="255" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="700" fill="#f8fafc">Kubernetes Resource</text>
<text x="80" y="333" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="700" fill="#f8fafc">Calculator</text>

  <!-- Tagline -->
  <text x="80" y="420" font-family="Inter, Arial, sans-serif" font-size="22" fill="#9ca3af">Plan Kubernetes requests and limits without guessing.</text>
<text x="80" y="452" font-family="Inter, Arial, sans-serif" font-size="22" fill="#9ca3af">See node-fit, cluster totals, and recommended burst.</text>

  <!-- terminal prompt footer -->
  <text x="80" y="560" font-family="Menlo, Monaco, monospace" font-size="20" fill="#34d399">$</text>
  <text x="108" y="560" font-family="Menlo, Monaco, monospace" font-size="20" fill="#d1d5db">devops-daily.com/tools</text>

  <!-- brand mark -->
  <text x="1120" y="600" font-family="Menlo, Monaco, monospace" font-size="16" fill="#fbbf24" text-anchor="end" font-weight="600">DevOps Daily</text>
</svg>