<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#141830;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c1222;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowA" cx="30%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#005571;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#005571;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glowB" cx="70%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:#F46800;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#F46800;stop-opacity:0" />
    </radialGradient>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="scoreGradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005571;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#005571;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="scoreGradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F46800;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#F46800;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <rect width="1200" height="630" fill="url(#glowA)"/>
  <rect width="1200" height="630" fill="url(#glowB)"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.8" fill="#ffffff" opacity="0.07"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="600" height="3" fill="#94a3f8" opacity="0.8"/>
  <rect x="600" y="0" width="600" height="3" fill="#F46800" opacity="0.8"/>

  <!-- Branding -->
  <text x="48" y="46" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#6366f1" opacity="0.7">devops-daily.com</text>

  <!-- Category pill top-right -->
  <rect x="1034" y="24" width="118" height="28" rx="14" fill="rgba(99,102,241,0.12)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="1103" y="43" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle">Log Management</text>

  <!-- Tool A section -->
  <rect x="40" y="80" width="520" height="300" rx="16" fill="rgba(255,255,255,0.02)" stroke="rgba(0,85,113,0.2)" stroke-width="1"/>

  <!-- Tool A colored top edge -->
  <rect x="40" y="80" width="520" height="3" rx="0" fill="#94a3f8" opacity="0.6"/>

  <!-- Tool A name -->
  <text x="300" y="190" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="#94a3f8" text-anchor="middle" filter="url(#softglow)">ELK Stack</text>

  <!-- Tool A score badge -->
  <rect x="240" y="240" width="120" height="56" rx="12" fill="url(#scoreGradA)" stroke="rgba(0,85,113,0.3)" stroke-width="1"/>
  <text x="288" y="278" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="#94a3f8" text-anchor="middle">4</text>
  <text x="318" y="272" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#64748b">/5</text>

  <!-- Tool A pros count -->
  <text x="300" y="330" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">7 pros  -  6 cons</text>

  <!-- VS badge -->
  <circle cx="600" cy="230" r="32" fill="#1e1b4b" stroke="#6366f1" stroke-width="2" opacity="0.9"/>
  <text x="600" y="238" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#c7d2fe" text-anchor="middle">VS</text>

  <!-- Tool B section -->
  <rect x="640" y="80" width="520" height="300" rx="16" fill="rgba(255,255,255,0.02)" stroke="rgba(244,104,0,0.2)" stroke-width="1"/>

  <!-- Tool B colored top edge -->
  <rect x="640" y="80" width="520" height="3" rx="0" fill="#F46800" opacity="0.6"/>

  <!-- Tool B name -->
  <text x="900" y="200" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="bold" fill="#F46800" text-anchor="middle" filter="url(#softglow)">Loki + Grafana</text>

  <!-- Tool B score badge -->
  <rect x="840" y="240" width="120" height="56" rx="12" fill="url(#scoreGradB)" stroke="rgba(244,104,0,0.3)" stroke-width="1"/>
  <text x="888" y="278" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" fill="#F46800" text-anchor="middle">4.3</text>
  <text x="918" y="272" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#64748b">/5</text>

  <!-- Tool B pros count -->
  <text x="900" y="330" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">7 pros  -  6 cons</text>

  <!-- Bottom section -->
  <rect x="0" y="394" width="1200" height="236" fill="rgba(0,0,0,0.25)"/>
  <line x1="48" y1="394" x2="1152" y2="394" stroke="#1e293b" stroke-width="1"/>

  <!-- Feature category tags -->
  <rect x="200" y="408" width="116" height="26" rx="13" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="258" y="426" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle">Architecture</text>
  <rect x="480" y="408" width="84" height="26" rx="13" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="522" y="426" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle">Querying</text>
  <rect x="760" y="408" width="124" height="26" rx="13" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
    <text x="822" y="426" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#a5b4fc" text-anchor="middle">Visualization</text>

  <!-- Stats line -->
  <text x="600" y="480" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#cbd5e1" text-anchor="middle">12 Features  |  Pros &amp; Cons  |  Use Cases  |  Verdict</text>

  <!-- CTA button -->
  <rect x="430" y="506" width="340" height="50" rx="25" fill="#4f46e5"/>
  <rect x="430" y="506" width="340" height="50" rx="25" fill="none" stroke="#6366f1" stroke-width="1"/>
  <text x="600" y="537" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Read the Full Comparison  &#8594;</text>

  <!-- Bottom URL -->
  <text x="600" y="596" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#475569" text-anchor="middle">devops-daily.com/comparisons/elk-stack-vs-loki-grafana</text>
</svg>