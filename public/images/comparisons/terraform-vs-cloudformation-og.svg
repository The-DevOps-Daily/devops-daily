<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B42BC;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7B42BC;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="glowB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#FF9900;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow from each tool's color -->
  <ellipse cx="250" cy="280" rx="350" ry="300" fill="url(#glowA)"/>
  <ellipse cx="950" cy="280" rx="350" ry="300" fill="url(#glowB)"/>

  <!-- Grid pattern overlay -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent lines -->
  <rect x="0" y="0" width="600" height="4" fill="#7B42BC"/>
  <rect x="600" y="0" width="600" height="4" fill="#FF9900"/>

  <!-- Branding top-left -->
  <text x="40" y="50" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#6366f1" opacity="0.8">devops-daily.com</text>

  <!-- Category badge top-right -->
  <rect x="971" y="28" width="189" height="30" rx="15" fill="rgba(99,102,241,0.15)" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
  <text x="1077.5" y="48" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#a5b4fc" text-anchor="middle" opacity="0.9">Infrastructure as Code</text>

  <!-- Tool A card -->
  <rect x="40" y="90" width="520" height="280" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(123,66,188,0.3)" stroke-width="1.5"/>
  <text x="300" y="220" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="#7B42BC" text-anchor="middle" filter="url(#glow)">Terraform</text>
  <text x="300" y="310" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#7B42BC" text-anchor="middle" opacity="0.8">4.3</text>
  <text x="332" y="310" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#64748b" opacity="0.6">/5</text>

  <!-- Tool B card -->
  <rect x="640" y="90" width="520" height="280" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,153,0,0.3)" stroke-width="1.5"/>
  <text x="900" y="220" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="#FF9900" text-anchor="middle" filter="url(#glow)">CloudFormation</text>
  <text x="900" y="310" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#FF9900" text-anchor="middle" opacity="0.8">3.9</text>
  <text x="932" y="310" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#64748b" opacity="0.6">/5</text>

  <!-- VS badge center -->
  <circle cx="600" cy="230" r="36" fill="#1e1b4b" stroke="#6366f1" stroke-width="2"/>
  <text x="600" y="240" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#a5b4fc" text-anchor="middle">VS</text>

  <!-- Bottom section -->
  <rect x="0" y="420" width="1200" height="210" fill="rgba(0,0,0,0.3)"/>
  <line x1="40" y1="420" x2="1160" y2="420" stroke="#334155" stroke-width="1"/>

  <!-- Feature count and stats -->
  <text x="600" y="470" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#e2e8f0" text-anchor="middle">12 Features Compared  |  Pros &amp; Cons  |  Use Cases  |  Verdict</text>

  <!-- CTA -->
  <rect x="440" y="500" width="320" height="48" rx="24" fill="#4f46e5"/>
  <text x="600" y="530" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="bold" fill="#ffffff" text-anchor="middle">Read the Full Comparison</text>

  <!-- Bottom branding -->
  <text x="600" y="600" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569" text-anchor="middle">devops-daily.com/comparisons</text>
</svg>