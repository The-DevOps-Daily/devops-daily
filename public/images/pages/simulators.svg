<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#fbbf24" stroke-width="1" opacity="0.08"/>
      <line x1="0" y1="0" x2="40" y2="0" stroke="#fbbf24" stroke-width="1" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top badges -->
  <rect x="80" y="70" width="154" height="44" rx="22" fill="#d97706" opacity="0.9"/>
  <text x="102" y="100" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc">GAMES</text>

  <rect x="254" y="70" width="182" height="44" rx="22" fill="#fbbf24" opacity="0.8"/>
  <text x="276" y="100" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#0f172a">INTERACTIVE</text>

  <!-- Gamepad icon badge, top-right -->
  <rect x="1020" y="70" width="100" height="44" rx="22" fill="#d97706" opacity="0.7"/>
  <text x="1070" y="100" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc" text-anchor="middle">30+</text>

  <!-- Decorative controller silhouette (right side, low opacity) -->
  <g opacity="0.15" transform="translate(860, 290)">
    <!-- Controller body -->
    <path d="M 40 40 Q 10 40 10 90 Q 10 140 50 150 L 90 150 Q 110 160 140 160 Q 170 160 190 150 L 230 150 Q 270 140 270 90 Q 270 40 240 40 Z" fill="#fbbf24"/>
    <!-- Left stick -->
    <circle cx="70" cy="90" r="18" fill="#0f172a"/>
    <circle cx="70" cy="90" r="10" fill="#fbbf24"/>
    <!-- Right stick -->
    <circle cx="210" cy="110" r="18" fill="#0f172a"/>
    <circle cx="210" cy="110" r="10" fill="#fbbf24"/>
    <!-- D-pad -->
    <rect x="100" y="80" width="10" height="30" fill="#0f172a"/>
    <rect x="90" y="90" width="30" height="10" fill="#0f172a"/>
    <!-- A B buttons -->
    <circle cx="180" cy="80" r="7" fill="#0f172a"/>
    <circle cx="200" cy="70" r="7" fill="#0f172a"/>
  </g>

  <!-- Title -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#f8fafc">Games &amp;</text>
  <text x="80" y="360" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#fbbf24">Simulators</text>

  <!-- Tagline -->
  <text x="80" y="420" font-family="Arial, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">Learn DevOps by playing. Interactive simulators</text>
  <text x="80" y="455" font-family="Arial, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">for Kubernetes, Docker, CI/CD, security, and more.</text>

  <!-- Bottom branding -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fbbf24">DevOps Daily</text>
  <text x="80" y="595" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#fbbf24" opacity="0.7">Interactive DevOps Practice</text>
</svg>
