<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#fbbf24" stroke-width="1" opacity="0.08"/>
      <line x1="0" y1="0" x2="40" y2="0" stroke="#fbbf24" stroke-width="1" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top badges -->
  <rect x="80" y="70" width="186" height="44" rx="22" fill="#d97706" opacity="0.9"/>
  <text x="102" y="100" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f8fafc">BOOKS</text>

  <rect x="286" y="70" width="280" height="44" rx="22" fill="#fbbf24" opacity="0.8"/>
  <text x="308" y="100" font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#0f172a">CURATED FOR DEVOPS</text>

  <!-- Decorative open-book illustration (right side, low opacity) -->
  <g opacity="0.15" transform="translate(880, 290)">
    <!-- Book shape -->
    <path d="M 0 0 L 0 220 Q 0 240 20 240 L 140 240 L 140 20 Q 140 0 120 0 Z" fill="#fbbf24"/>
    <path d="M 160 0 L 160 220 Q 160 240 180 240 L 300 240 L 300 20 Q 300 0 280 0 Z" fill="#fbbf24"/>
    <!-- Spine gap -->
    <rect x="140" y="0" width="20" height="240" fill="#0f172a"/>
    <!-- Lines -->
    <rect x="30" y="40" width="90" height="6" fill="#0f172a"/>
    <rect x="30" y="60" width="100" height="6" fill="#0f172a"/>
    <rect x="30" y="80" width="80" height="6" fill="#0f172a"/>
    <rect x="30" y="100" width="95" height="6" fill="#0f172a"/>
    <rect x="180" y="40" width="100" height="6" fill="#0f172a"/>
    <rect x="180" y="60" width="90" height="6" fill="#0f172a"/>
    <rect x="180" y="80" width="100" height="6" fill="#0f172a"/>
    <rect x="180" y="100" width="80" height="6" fill="#0f172a"/>
  </g>

  <!-- Title -->
  <text x="80" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#f8fafc">DevOps Books</text>

  <!-- Tagline -->
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">Essential reads for SRE, Cloud, and Platform</text>
  <text x="80" y="375" font-family="Arial, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">Engineering</text>

  <!-- Topic pills -->
  <g transform="translate(80, 430)">
    <rect x="0" y="0" width="78" height="36" rx="18" fill="#1e3a8a" opacity="0.6"/>
    <text x="39" y="23" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#60a5fa" text-anchor="middle">Cloud</text>

    <rect x="92" y="0" width="58" height="36" rx="18" fill="#14532d" opacity="0.6"/>
    <text x="121" y="23" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#4ade80" text-anchor="middle">SRE</text>

    <rect x="164" y="0" width="92" height="36" rx="18" fill="#4c1d95" opacity="0.6"/>
    <text x="210" y="23" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#a78bfa" text-anchor="middle">DevOps</text>

    <rect x="270" y="0" width="100" height="36" rx="18" fill="#7f1d1d" opacity="0.6"/>
    <text x="320" y="23" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#f87171" text-anchor="middle">Security</text>

    <rect x="384" y="0" width="100" height="36" rx="18" fill="#78350f" opacity="0.6"/>
    <text x="434" y="23" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#fbbf24" text-anchor="middle">Platform</text>
  </g>

  <!-- Bottom branding -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fbbf24">DevOps Daily</text>
  <text x="80" y="595" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#fbbf24" opacity="0.7">Curated Reading List</text>
</svg>
