<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">3D Cloud Region Failure Simulator</title>
  <desc id="desc">Visualize multi-AZ outages, failover, retry storms, queues, and cache failures.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090b"/>
      <stop offset="0.55" stop-color="#111113"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5a524"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="zoneGood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="zoneWarn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="zoneBad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#27272a" stroke-opacity="0.55" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M0 570H1200V630H0Z" fill="#09090b" opacity="0.86"/>

  <g transform="translate(76 102)" filter="url(#shadow)">
    <path d="M50 290L292 174L540 286L292 414Z" fill="#111827" stroke="#334155" stroke-width="2"/>
    <path d="M50 290V322L292 454V414Z" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <path d="M540 286V318L292 454V414Z" fill="#111827" stroke="#334155" stroke-width="2"/>

    <g transform="translate(102 146)">
      <path d="M0 70L92 26L184 70L92 116Z" fill="url(#zoneGood)" stroke="#22c55e" stroke-width="2"/>
      <path d="M0 70V100L92 146V116Z" fill="#064e3b"/>
      <path d="M184 70V100L92 146V116Z" fill="#0f766e"/>
      <text x="64" y="76" fill="#ecfeff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">AZ-a</text>
    </g>

    <g transform="translate(236 82)">
      <path d="M0 70L92 26L184 70L92 116Z" fill="url(#zoneBad)" stroke="#f87171" stroke-width="2"/>
      <path d="M0 70V100L92 146V116Z" fill="#7f1d1d"/>
      <path d="M184 70V100L92 146V116Z" fill="#991b1b"/>
      <text x="64" y="76" fill="#fef2f2" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">AZ-b</text>
      <text x="56" y="105" fill="#fecaca" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700">outage</text>
    </g>

    <g transform="translate(354 164)">
      <path d="M0 70L92 26L184 70L92 116Z" fill="url(#zoneWarn)" stroke="#fbbf24" stroke-width="2"/>
      <path d="M0 70V100L92 146V116Z" fill="#7c2d12"/>
      <path d="M184 70V100L92 146V116Z" fill="#92400e"/>
      <text x="64" y="76" fill="#fffbeb" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">AZ-c</text>
      <text x="50" y="105" fill="#fde68a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700">overloaded</text>
    </g>

    <g fill="none" stroke-linecap="round" stroke-width="7">
      <path d="M292 56C244 80 207 112 186 152" stroke="#38bdf8"/>
      <path d="M292 56C318 86 338 116 328 152" stroke="#ef4444"/>
      <path d="M292 56C382 88 430 130 450 190" stroke="#f59e0b"/>
      <path d="M184 266C268 302 350 302 446 234" stroke="#22c55e" stroke-opacity="0.85"/>
    </g>

    <g transform="translate(206 16)">
      <rect x="0" y="0" width="172" height="56" rx="16" fill="#18181b" stroke="#f5a524" stroke-width="2"/>
      <text x="86" y="35" fill="#fef3c7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="800" text-anchor="middle">Load Balancer</text>
    </g>

    <g transform="translate(76 360)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="800">
      <rect x="0" y="0" width="112" height="34" rx="17" fill="none" stroke="#38bdf8" stroke-width="2"/>
      <text x="25" y="23" fill="#93c5fd">traffic</text>
      <rect x="128" y="0" width="118" height="34" rx="17" fill="none" stroke="#ef4444" stroke-width="2"/>
      <text x="153" y="23" fill="#fecaca">outage</text>
      <rect x="262" y="0" width="118" height="34" rx="17" fill="none" stroke="#f59e0b" stroke-width="2"/>
      <text x="286" y="23" fill="#fde68a">failover</text>
      <rect x="396" y="0" width="112" height="34" rx="17" fill="none" stroke="#22c55e" stroke-width="2"/>
      <text x="420" y="23" fill="#bbf7d0">recovery</text>
    </g>
  </g>

  <g transform="translate(704 88)">
    <rect x="130" y="0" width="92" height="92" rx="22" fill="#18181b" stroke="#f5a524" stroke-opacity="0.72"/>
    <g transform="translate(176 46)" fill="none" stroke="#fbbf24" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
      <path d="M-32 9c9-20 19-30 32-30s25 10 32 30"/>
      <path d="M-22 8h44"/>
      <path d="M-14 20h28"/>
      <circle cx="-23" cy="-10" r="8"/>
      <circle cx="23" cy="-10" r="8"/>
    </g>

    <text x="0" y="164" fill="url(#titleGradient)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="43" font-weight="800">3D Cloud Region</text>
    <text x="0" y="218" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="43" font-weight="800">Failure Simulator</text>
    <text x="2" y="260" fill="#9ca3af" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">Watch outages, failover, and blast radius</text>

    <g transform="translate(0 306)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">
      <circle cx="10" cy="8" r="8" fill="#38bdf8"/>
      <text x="30" y="15" fill="#d1d5db">Multi-AZ traffic in motion</text>
      <circle cx="10" cy="48" r="8" fill="#ef4444"/>
      <text x="30" y="55" fill="#d1d5db">AZ outage, retry storm, cache loss</text>
      <circle cx="10" cy="88" r="8" fill="#22c55e"/>
      <text x="30" y="95" fill="#d1d5db">DB failover and graceful recovery</text>
    </g>

  </g>

  <text x="704" y="560" fill="#6b7280" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">devops-daily.com/games/cloud-region-failure-simulator</text>
</svg>
