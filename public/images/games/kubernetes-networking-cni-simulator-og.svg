<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes Networking / CNI Simulator</title>
  <desc id="desc">Visualize Pod routing, CNI dataplanes, Services, Ingress, NetworkPolicy, and egress.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.58" stop-color="#101827"/>
      <stop offset="1" stop-color="#0f2a34"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="packet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#93c5fd" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M0 570H1200V630H0Z" fill="#0b1220" opacity="0.72"/>
  <circle cx="106" cy="98" r="144" fill="#0f766e" opacity="0.12"/>
  <circle cx="1080" cy="494" r="178" fill="#0284c7" opacity="0.14"/>
  <circle cx="910" cy="124" r="105" fill="#334155" opacity="0.24"/>

  <g transform="translate(78 96)" filter="url(#softShadow)">
    <rect x="0" y="0" width="590" height="432" rx="16" fill="url(#panel)" stroke="#334155" stroke-width="2"/>
    <rect x="24" y="24" width="542" height="42" rx="10" fill="#0f172a" stroke="#334155"/>
    <text x="46" y="51" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">cluster.local / pod network 10.244.0.0/16</text>

    <g transform="translate(36 96)">
      <rect x="0" y="0" width="218" height="224" rx="14" fill="#0f172a" stroke="#2563eb" stroke-opacity="0.65"/>
      <text x="18" y="31" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800">node-a</text>
      <text x="18" y="54" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">10.244.1.0/24</text>

      <rect x="18" y="78" width="182" height="48" rx="9" fill="#172554" stroke="#38bdf8" stroke-opacity="0.65"/>
      <text x="34" y="108" fill="#e0f2fe" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">frontend Pod</text>

      <rect x="18" y="142" width="182" height="48" rx="9" fill="#12312c" stroke="#22c55e" stroke-opacity="0.65"/>
      <text x="34" y="172" fill="#dcfce7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">api Pod</text>

      <rect x="18" y="204" width="182" height="1.5" rx="1" fill="#334155"/>
    </g>

    <g transform="translate(336 96)">
      <rect x="0" y="0" width="218" height="224" rx="14" fill="#0f172a" stroke="#2563eb" stroke-opacity="0.65"/>
      <text x="18" y="31" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="800">node-b</text>
      <text x="18" y="54" fill="#94a3b8" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">10.244.2.0/24</text>

      <rect x="18" y="78" width="182" height="48" rx="9" fill="#12312c" stroke="#22c55e" stroke-opacity="0.65"/>
      <text x="34" y="108" fill="#dcfce7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">payments Pod</text>

      <rect x="18" y="142" width="182" height="48" rx="9" fill="#172554" stroke="#38bdf8" stroke-opacity="0.65"/>
      <text x="34" y="172" fill="#e0f2fe" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700">worker Pod</text>

      <rect x="18" y="204" width="182" height="1.5" rx="1" fill="#334155"/>
    </g>

    <path d="M254 188H336" fill="none" stroke="url(#packet)" stroke-width="5" stroke-linecap="round"/>
    <path d="M322 176L342 188L322 200" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="296" cy="188" r="10" fill="#38bdf8"/>
    <text x="259" y="166" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">CNI dataplane</text>

    <g transform="translate(36 354)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">
      <rect x="0" y="0" width="118" height="34" rx="17" fill="none" stroke="#38bdf8" stroke-width="2"/>
      <text x="22" y="23" fill="#93c5fd">ClusterIP</text>

      <rect x="136" y="0" width="86" height="34" rx="17" fill="none" stroke="#22c55e" stroke-width="2"/>
      <text x="160" y="23" fill="#86efac">eBPF</text>

      <rect x="240" y="0" width="142" height="34" rx="17" fill="none" stroke="#a855f7" stroke-width="2"/>
      <text x="263" y="23" fill="#d8b4fe">NetworkPolicy</text>

      <rect x="400" y="0" width="92" height="34" rx="17" fill="none" stroke="#f97316" stroke-width="2"/>
      <text x="426" y="23" fill="#fdba74">Ingress</text>
    </g>
  </g>

  <g transform="translate(704 86)">
    <rect x="130" y="0" width="92" height="92" rx="22" fill="#082f49" stroke="#38bdf8" stroke-opacity="0.5"/>
    <g transform="translate(176 46)" fill="none" stroke="#67e8f9" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
      <circle cx="0" cy="0" r="25"/>
      <path d="M-25 0H25"/>
      <path d="M0 -25C10 -14 14 -5 14 0S10 14 0 25"/>
      <path d="M0 -25C-10 -14 -14 -5 -14 0S-10 14 0 25"/>
      <circle cx="-34" cy="0" r="5" fill="#67e8f9" stroke="none"/>
      <circle cx="34" cy="0" r="5" fill="#67e8f9" stroke="none"/>
      <circle cx="0" cy="-34" r="5" fill="#67e8f9" stroke="none"/>
      <circle cx="0" cy="34" r="5" fill="#67e8f9" stroke="none"/>
    </g>

    <text x="0" y="164" fill="url(#titleGradient)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="43" font-weight="800">Kubernetes</text>
    <text x="0" y="218" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="43" font-weight="800">Networking / CNI</text>
    <text x="0" y="272" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="43" font-weight="800">Simulator</text>
    <text x="2" y="314" fill="#9ca3af" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">Follow every packet hop</text>

    <g transform="translate(0 358)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">
      <circle cx="10" cy="8" r="8" fill="#38bdf8"/>
      <text x="30" y="15" fill="#d1d5db">Pod IP routing across nodes</text>

      <circle cx="10" cy="48" r="8" fill="#22c55e"/>
      <text x="30" y="55" fill="#d1d5db">ClusterIP, kube-proxy, eBPF</text>

      <circle cx="10" cy="88" r="8" fill="#a855f7"/>
      <text x="30" y="95" fill="#d1d5db">Ingress, policy, egress SNAT</text>
    </g>
  </g>

  <text x="356" y="608" fill="#6b7280" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">devops-daily.com/games/kubernetes-networking-cni-simulator</text>
</svg>
