<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript Promises and Async/Await Simulator</title>
  <desc id="desc">Visualize the call stack, microtask queue, task queue, promise state, and console output.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090b"/>
      <stop offset="0.58" stop-color="#111113"/>
      <stop offset="1" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5a524"/>
      <stop offset="1" stop-color="#facc15"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#27272a" stroke-opacity="0.62" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M0 570H1200V630H0Z" fill="#09090b" opacity="0.82"/>

  <g transform="translate(70 82)" filter="url(#shadow)">
    <rect x="0" y="0" width="548" height="438" rx="24" fill="#111113" stroke="#3f3f46" stroke-width="2"/>
    <rect x="28" y="30" width="188" height="84" rx="14" fill="#18181b" stroke="#f5a524" stroke-width="2"/>
    <text x="54" y="62" fill="#fef3c7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">Call Stack</text>
    <rect x="48" y="78" width="148" height="22" rx="11" fill="#f5a524" opacity="0.2"/>
    <text x="62" y="94" fill="#fde68a" font-family="Menlo, monospace" font-size="13">global script</text>

    <rect x="304" y="30" width="216" height="84" rx="14" fill="#18181b" stroke="#38bdf8" stroke-width="2"/>
    <text x="330" y="62" fill="#e0f2fe" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">Runtime APIs</text>
    <rect x="326" y="78" width="170" height="22" rx="11" fill="#38bdf8" opacity="0.18"/>
    <text x="344" y="94" fill="#bae6fd" font-family="Menlo, monospace" font-size="13">timer: 0ms</text>

    <path d="M216 72H304" fill="none" stroke="#71717a" stroke-width="3" stroke-linecap="round"/>
    <path d="M294 62L306 72L294 82" fill="none" stroke="#71717a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="28" y="176" width="220" height="96" rx="14" fill="#18181b" stroke="#f5a524" stroke-width="2"/>
    <text x="54" y="208" fill="#fef3c7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">Microtask Queue</text>
    <rect x="50" y="226" width="176" height="24" rx="12" fill="#f5a524" opacity="0.2"/>
    <text x="66" y="243" fill="#fde68a" font-family="Menlo, monospace" font-size="13">then callback</text>

    <rect x="300" y="176" width="220" height="96" rx="14" fill="#18181b" stroke="#a1a1aa" stroke-width="2"/>
    <text x="326" y="208" fill="#e4e4e7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">Task Queue</text>
    <rect x="322" y="226" width="172" height="24" rx="12" fill="#71717a" opacity="0.22"/>
    <text x="338" y="243" fill="#d4d4d8" font-family="Menlo, monospace" font-size="13">timeout callback</text>

    <path d="M410 114C414 142 412 154 410 176" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
    <path d="M400 164L410 178L420 164" fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M138 176C132 148 134 136 138 114" fill="none" stroke="#f5a524" stroke-width="4" stroke-linecap="round"/>
    <path d="M128 126L138 112L148 126" fill="none" stroke="#f5a524" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="28" y="330" width="220" height="72" rx="14" fill="#18181b" stroke="#22c55e" stroke-width="2"/>
    <text x="54" y="362" fill="#dcfce7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">Promise State</text>
    <text x="54" y="386" fill="#bbf7d0" font-family="Menlo, monospace" font-size="14">fulfilled: "Promise"</text>

    <rect x="300" y="330" width="220" height="72" rx="14" fill="#18181b" stroke="#22c55e" stroke-width="2"/>
    <text x="326" y="362" fill="#dcfce7" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800">Console</text>
    <text x="326" y="386" fill="#bbf7d0" font-family="Menlo, monospace" font-size="14">Start - End - Promise</text>
  </g>

  <g transform="translate(684 92)">
    <rect x="0" y="0" width="96" height="96" rx="24" fill="#18181b" stroke="#f5a524" stroke-opacity="0.75"/>
    <text x="24" y="62" fill="#f5a524" font-family="Menlo, monospace" font-size="42" font-weight="900">{ }</text>

    <text x="0" y="168" fill="url(#titleGradient)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="800">JavaScript Promises</text>
    <text x="0" y="222" fill="#fafafa" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="800">&amp; Async/Await</text>
    <text x="2" y="264" fill="#a1a1aa" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">An interactive event-loop simulator</text>

    <g transform="translate(0 316)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">
      <circle cx="10" cy="8" r="8" fill="#f5a524"/>
      <text x="30" y="15" fill="#d4d4d8">Step through microtasks vs timers</text>
      <circle cx="10" cy="48" r="8" fill="#38bdf8"/>
      <text x="30" y="55" fill="#d4d4d8">Watch await suspend and resume</text>
      <circle cx="10" cy="88" r="8" fill="#22c55e"/>
      <text x="30" y="95" fill="#d4d4d8">Predict console output order</text>
    </g>
  </g>

  <text x="684" y="560" fill="#71717a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">devops-daily.com/games/javascript-promises-async-await-simulator</text>
</svg>
