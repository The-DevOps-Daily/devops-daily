<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Message Queue Simulator</title>
  <desc id="desc">Visualize Kafka and RabbitMQ producers, brokers, partitions, consumers, lag, and dead letter queues.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.55" stop-color="#11162a"/>
      <stop offset="1" stop-color="#0f2138"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d97706"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#93c5fd" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="116" cy="108" r="148" fill="#0f766e" opacity="0.12"/>
  <circle cx="1092" cy="504" r="184" fill="#2563eb" opacity="0.12"/>
  <circle cx="908" cy="126" r="108" fill="#334155" opacity="0.24"/>

  <g transform="translate(82 126)">
    <rect x="0" y="0" width="570" height="400" rx="14" fill="#111827" stroke="#334155" stroke-width="2"/>

    <text x="28" y="44" fill="#9ca3af" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17">// queue topology</text>

    <g transform="translate(42 82)">
      <rect x="0" y="0" width="132" height="74" rx="10" fill="#172554" stroke="#38bdf8" stroke-opacity="0.55"/>
      <text x="24" y="30" fill="#bfdbfe" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">Producer</text>
      <text x="24" y="54" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">+12 msg/s</text>

      <path d="M150 37H226" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
      <path d="M210 25 228 37 210 49" fill="none" stroke="#38bdf8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

      <rect x="248" y="-18" width="182" height="224" rx="12" fill="#0f172a" stroke="#d97706" stroke-opacity="0.7"/>
      <text x="286" y="18" fill="#fed7aa" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">Broker</text>
      <text x="286" y="42" fill="#fbbf24" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">topic/orders</text>

      <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13">
        <rect x="272" y="68" width="134" height="28" rx="6" fill="#291b05" stroke="#d97706" stroke-opacity="0.5"/>
        <text x="286" y="87" fill="#fde68a">partition-0  8</text>
        <rect x="272" y="106" width="134" height="28" rx="6" fill="#291b05" stroke="#d97706" stroke-opacity="0.5"/>
        <text x="286" y="125" fill="#fde68a">partition-1  3</text>
        <rect x="272" y="144" width="134" height="28" rx="6" fill="#291b05" stroke="#d97706" stroke-opacity="0.5"/>
        <text x="286" y="163" fill="#fde68a">partition-2  0</text>
      </g>

      <path d="M448 82H516" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
      <path d="M500 70 518 82 500 94" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

      <g transform="translate(466 28)">
        <rect x="0" y="0" width="94" height="46" rx="8" fill="#052e1a" stroke="#22c55e" stroke-opacity="0.55"/>
        <text x="18" y="29" fill="#bbf7d0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">C-1</text>
      </g>
      <g transform="translate(466 88)">
        <rect x="0" y="0" width="94" height="46" rx="8" fill="#052e1a" stroke="#22c55e" stroke-opacity="0.55"/>
        <text x="18" y="29" fill="#bbf7d0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">C-2</text>
      </g>
      <g transform="translate(466 148)">
        <rect x="0" y="0" width="94" height="46" rx="8" fill="#052e1a" stroke="#22c55e" stroke-opacity="0.55"/>
        <text x="18" y="29" fill="#bbf7d0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700">C-3</text>
      </g>
    </g>

    <g transform="translate(52 334)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
      <rect x="0" y="0" width="112" height="34" rx="17" fill="none" stroke="#d97706" stroke-width="2"/>
      <text x="30" y="23" fill="#fed7aa" font-size="14" font-weight="700">Kafka</text>
      <rect x="128" y="0" width="132" height="34" rx="17" fill="none" stroke="#38bdf8" stroke-width="2"/>
      <text x="155" y="23" fill="#bae6fd" font-size="14" font-weight="700">RabbitMQ</text>
      <rect x="276" y="0" width="112" height="34" rx="17" fill="none" stroke="#ef4444" stroke-width="2"/>
      <text x="310" y="23" fill="#fecaca" font-size="14" font-weight="700">DLQ</text>
    </g>
  </g>

  <g transform="translate(706 108)">
    <rect x="144" y="0" width="80" height="80" rx="18" fill="#2b1b05" stroke="#d97706" stroke-opacity="0.45"/>
    <g transform="translate(164 22)" fill="none" stroke="#38bdf8" stroke-linecap="round" stroke-linejoin="round" stroke-width="3">
      <rect x="0" y="4" width="40" height="28" rx="5"/>
      <path d="M8 12H32"/>
      <path d="M8 20H24"/>
      <path d="M11 32 8 40 20 32"/>
    </g>

    <text x="0" y="150" fill="url(#titleGradient)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="54" font-weight="800">Message Queue</text>
    <text x="0" y="210" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="56" font-weight="800">Simulator</text>
    <text x="2" y="252" fill="#9ca3af" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">Kafka and RabbitMQ, visualized</text>

    <g transform="translate(0 296)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">
      <circle cx="10" cy="8" r="8" fill="#d97706"/>
      <text x="30" y="15" fill="#d1d5db">Producers, topics, exchanges</text>
      <circle cx="10" cy="48" r="8" fill="#38bdf8"/>
      <text x="30" y="55" fill="#d1d5db">Partitions, queues, consumer groups</text>
      <circle cx="10" cy="88" r="8" fill="#22c55e"/>
      <text x="30" y="95" fill="#d1d5db">Lag, rebalancing, backpressure</text>
      <circle cx="10" cy="128" r="8" fill="#ef4444"/>
      <text x="30" y="135" fill="#d1d5db">Poison messages and DLQs</text>
    </g>
  </g>

  <text x="402" y="600" fill="#6b7280" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">devops-daily.com/games/message-queue-simulator</text>
</svg>
