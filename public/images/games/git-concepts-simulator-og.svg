<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Git Concepts Simulator</title>
  <desc id="desc">Practice Git with an interactive terminal and visual repository model.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.58" stop-color="#11162a"/>
      <stop offset="1" stop-color="#27150f"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262626"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#93c5fd" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M0 570H1200V630H0Z" fill="#0b1220" opacity="0.72"/>
  <circle cx="116" cy="98" r="144" fill="#0f766e" opacity="0.12"/>
  <circle cx="1076" cy="504" r="178" fill="#f97316" opacity="0.10"/>
  <circle cx="890" cy="127" r="105" fill="#334155" opacity="0.24"/>

  <g transform="translate(82 150)">
    <rect x="0" y="0" width="585" height="380" rx="12" fill="url(#terminal)" stroke="#475569" stroke-width="2"/>
    <rect x="0" y="0" width="585" height="40" rx="12" fill="#333331"/>
    <path d="M0 24C0 10.745 10.745 0 24 0H561C574.255 0 585 10.745 585 24V40H0V24Z" fill="#333331"/>
    <circle cx="26" cy="20" r="7" fill="#ff5f57"/>
    <circle cx="50" cy="20" r="7" fill="#ffbd2e"/>
    <circle cx="74" cy="20" r="7" fill="#28c840"/>
    <text x="184" y="26" fill="#a3a3a3" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">devops@git-lab: ~/repo</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">
      <text x="22" y="75" fill="#22c55e">$ git status</text>
      <text x="22" y="103" fill="#d4d4d4">On branch main</text>
      <text x="22" y="131" fill="#d4d4d4">nothing to commit, working tree clean</text>

      <text x="22" y="177" fill="#22c55e">$ echo "Hi, I am Bob." &gt; Bob.txt</text>
      <text x="22" y="223" fill="#22c55e">$ git add Bob.txt</text>
      <text x="22" y="269" fill="#22c55e">$ git commit -m "Add Bob"</text>
      <text x="22" y="297" fill="#d4d4d4">[main c3d4e5f] Add Bob</text>

      <text x="22" y="343" fill="#22c55e">$ git log --oneline --graph</text>
    </g>
  </g>

  <g transform="translate(704 82)">
    <rect x="139" y="0" width="86" height="86" rx="20" fill="#321a10" stroke="#f97316" stroke-opacity="0.5"/>
    <g transform="translate(182 43)" fill="none" stroke="#fb923c" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
      <path d="M-26 -26 26 26"/>
      <circle cx="-26" cy="-26" r="8" fill="#321a10"/>
      <circle cx="0" cy="0" r="8" fill="#321a10"/>
      <circle cx="26" cy="26" r="8" fill="#321a10"/>
      <path d="M0 0 24 -24"/>
      <circle cx="24" cy="-24" r="8" fill="#321a10"/>
    </g>

    <text x="0" y="158" fill="url(#titleGradient)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="49" font-weight="800">Git Concepts</text>
    <text x="0" y="216" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="49" font-weight="800">Simulator</text>
    <text x="2" y="258" fill="#9ca3af" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">Learn snapshots, refs, and remotes</text>

    <g transform="translate(0 302)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">
      <circle cx="10" cy="8" r="8" fill="#38bdf8"/>
      <text x="30" y="15" fill="#d1d5db">Working tree, index, commits</text>

      <circle cx="10" cy="48" r="8" fill="#22c55e"/>
      <text x="30" y="55" fill="#d1d5db">HEAD and branch pointers</text>

      <circle cx="10" cy="88" r="8" fill="#f97316"/>
      <text x="30" y="95" fill="#d1d5db">Push, fetch, merge, rebase</text>
    </g>

    <g transform="translate(0 426)">
      <rect x="0" y="0" width="88" height="34" rx="17" fill="none" stroke="#38bdf8" stroke-width="2"/>
      <text x="21" y="23" fill="#93c5fd" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">add</text>

      <rect x="104" y="0" width="104" height="34" rx="17" fill="none" stroke="#22c55e" stroke-width="2"/>
      <text x="126" y="23" fill="#86efac" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">commit</text>

      <rect x="224" y="0" width="94" height="34" rx="17" fill="none" stroke="#f97316" stroke-width="2"/>
      <text x="247" y="23" fill="#fdba74" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">merge</text>
    </g>
  </g>

  <text x="421" y="608" fill="#6b7280" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">devops-daily.com/games/git-concepts-simulator</text>
</svg>
