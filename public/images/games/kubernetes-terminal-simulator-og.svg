<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes Terminal Simulator</title>
  <desc id="desc">Practice kubectl in a browser with interactive lessons and live cluster state.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.58" stop-color="#11162a"/>
      <stop offset="1" stop-color="#0f2138"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262626"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <linearGradient id="kubeMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#93c5fd" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M0 570H1200V630H0Z" fill="#0b1220" opacity="0.72"/>
  <circle cx="116" cy="98" r="144" fill="#0f766e" opacity="0.12"/>
  <circle cx="1088" cy="510" r="180" fill="#2563eb" opacity="0.12"/>
  <circle cx="895" cy="127" r="105" fill="#334155" opacity="0.24"/>

  <g transform="translate(90 156)">
    <rect x="0" y="0" width="570" height="374" rx="12" fill="url(#terminal)" stroke="#475569" stroke-width="2"/>
    <rect x="0" y="0" width="570" height="40" rx="12" fill="#333331"/>
    <path d="M0 24C0 10.745 10.745 0 24 0H546C559.255 0 570 10.745 570 24V40H0V24Z" fill="#333331"/>
    <circle cx="26" cy="20" r="7" fill="#ff5f57"/>
    <circle cx="50" cy="20" r="7" fill="#ffbd2e"/>
    <circle cx="74" cy="20" r="7" fill="#28c840"/>
    <text x="184" y="26" fill="#a3a3a3" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">user@kube-lab: ~/.kube</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">
      <text x="22" y="75" fill="#22c55e">$ kubectl get nodes</text>
      <text x="22" y="103" fill="#9ca3af">NAME              STATUS   ROLES</text>
      <text x="22" y="131" fill="#d4d4d4">control-plane-1   Ready    control-plane</text>
      <text x="22" y="159" fill="#d4d4d4">worker-1          Ready    worker</text>

      <text x="22" y="205" fill="#22c55e">$ kubectl create deployment web --image=nginx:1.27</text>
      <text x="22" y="233" fill="#d4d4d4">deployment.apps/web created</text>

      <text x="22" y="279" fill="#22c55e">$ kubectl get pods</text>
      <text x="22" y="307" fill="#9ca3af">NAME                    READY   STATUS</text>
      <text x="22" y="335" fill="#d4d4d4">web-5d8f7c9b7b-0       1/1     Running</text>
    </g>
  </g>

  <g transform="translate(680 92)">
    <rect x="136" y="0" width="86" height="86" rx="20" fill="#0f2f4f" stroke="#2563eb" stroke-opacity="0.45"/>
    <g transform="translate(179 43)">
      <circle r="25" fill="none" stroke="url(#kubeMark)" stroke-width="4"/>
      <circle r="5" fill="#e0f2fe"/>
      <g stroke="url(#kubeMark)" stroke-width="3" stroke-linecap="round">
        <path d="M0 -35V-22"/>
        <path d="M0 35V22"/>
        <path d="M30.3 -17.5 19 -11"/>
        <path d="M-30.3 17.5 -19 11"/>
        <path d="M30.3 17.5 19 11"/>
        <path d="M-30.3 -17.5 -19 -11"/>
      </g>
      <g fill="#e0f2fe">
        <circle cx="0" cy="-35" r="4"/>
        <circle cx="30.3" cy="-17.5" r="4"/>
        <circle cx="30.3" cy="17.5" r="4"/>
        <circle cx="0" cy="35" r="4"/>
        <circle cx="-30.3" cy="17.5" r="4"/>
        <circle cx="-30.3" cy="-17.5" r="4"/>
      </g>
    </g>

    <text x="0" y="158" fill="url(#titleGradient)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="800">Kubernetes</text>
    <text x="0" y="216" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="44" font-weight="800">Terminal Simulator</text>
    <text x="2" y="258" fill="#9ca3af" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">Practice kubectl without a cluster</text>

    <g transform="translate(0 302)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">
      <circle cx="10" cy="8" r="8" fill="#38bdf8"/>
      <text x="30" y="15" fill="#d1d5db">Guided CLI lessons</text>

      <circle cx="10" cy="48" r="8" fill="#22c55e"/>
      <text x="30" y="55" fill="#d1d5db">Pods, Deployments, Services</text>

      <circle cx="10" cy="88" r="8" fill="#a855f7"/>
      <text x="30" y="95" fill="#d1d5db">Rollouts, logs, exec, events</text>
    </g>

    <g transform="translate(0 424)">
      <rect x="0" y="0" width="118" height="34" rx="17" fill="none" stroke="#38bdf8" stroke-width="2"/>
      <text x="21" y="23" fill="#93c5fd" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">get pods</text>

      <rect x="134" y="0" width="124" height="34" rx="17" fill="none" stroke="#22c55e" stroke-width="2"/>
      <text x="155" y="23" fill="#86efac" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">rollout</text>

      <rect x="274" y="0" width="118" height="34" rx="17" fill="none" stroke="#a855f7" stroke-width="2"/>
      <text x="297" y="23" fill="#d8b4fe" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">events</text>
    </g>
  </g>

  <text x="382" y="608" fill="#6b7280" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">devops-daily.com/games/kubernetes-terminal-simulator</text>
</svg>
