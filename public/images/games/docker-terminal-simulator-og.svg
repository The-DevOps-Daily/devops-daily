<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Docker Terminal Simulator</title>
  <desc id="desc">Practice Docker commands in a browser with interactive lessons and live container state.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.58" stop-color="#11162a"/>
      <stop offset="1" stop-color="#0f2138"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262626"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <linearGradient id="dockerMark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#93c5fd" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M0 570H1200V630H0Z" fill="#0b1220" opacity="0.72"/>
  <circle cx="116" cy="98" r="144" fill="#0f766e" opacity="0.12"/>
  <circle cx="1088" cy="510" r="180" fill="#2563eb" opacity="0.12"/>
  <circle cx="895" cy="127" r="105" fill="#334155" opacity="0.24"/>

  <g transform="translate(94 176)">
    <rect x="0" y="0" width="554" height="354" rx="12" fill="url(#terminal)" stroke="#475569" stroke-width="2"/>
    <rect x="0" y="0" width="554" height="40" rx="12" fill="#333331"/>
    <path d="M0 24C0 10.745 10.745 0 24 0H530C543.255 0 554 10.745 554 24V40H0V24Z" fill="#333331"/>
    <circle cx="26" cy="20" r="7" fill="#ff5f57"/>
    <circle cx="50" cy="20" r="7" fill="#ffbd2e"/>
    <circle cx="74" cy="20" r="7" fill="#28c840"/>
    <text x="198" y="26" fill="#a3a3a3" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">user@docker-lab: ~/app</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="17">
      <text x="22" y="75" fill="#22c55e">$ docker pull nginx:alpine</text>
      <text x="22" y="103" fill="#d4d4d4">Status: Downloaded newer image</text>

      <text x="22" y="149" fill="#22c55e">$ docker run -d --name web -p 8080:80 nginx:alpine</text>
      <text x="22" y="177" fill="#d4d4d4">b8c1701fcf89</text>

      <text x="22" y="223" fill="#22c55e">$ docker ps</text>
      <text x="22" y="251" fill="#9ca3af">IMAGE          STATUS       PORTS</text>
      <text x="22" y="279" fill="#d4d4d4">nginx:alpine   Up healthy   8080-&gt;80/tcp</text>

      <text x="22" y="325" fill="#22c55e">$ docker compose up -d</text>
    </g>
  </g>

  <g transform="translate(704 122)">
    <rect x="146" y="0" width="80" height="80" rx="18" fill="#0f2f4f" stroke="#2563eb" stroke-opacity="0.45"/>
    <g transform="translate(166 18)" fill="none" stroke="url(#dockerMark)" stroke-linecap="round" stroke-linejoin="round" stroke-width="3">
      <path d="M20 5 3 14.5v21L20 45l17-9.5v-21L20 5Z"/>
      <path d="M3 14.5 20 24l17-9.5"/>
      <path d="M20 24v21"/>
      <path d="M11.5 19.2 28.5 9.7"/>
      <path d="M28.5 19.2 11.5 9.7"/>
    </g>

    <text x="0" y="150" fill="url(#titleGradient)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="54" font-weight="800">Docker Terminal</text>
    <text x="0" y="209" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="54" font-weight="800">Simulator</text>
    <text x="2" y="252" fill="#9ca3af" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">Practice containers without a daemon</text>

    <g transform="translate(0 296)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">
      <circle cx="10" cy="8" r="8" fill="#38bdf8"/>
      <text x="30" y="15" fill="#d1d5db">Interactive CLI lessons</text>

      <circle cx="10" cy="48" r="8" fill="#22c55e"/>
      <text x="30" y="55" fill="#d1d5db">Images, containers, logs, exec</text>

      <circle cx="10" cy="88" r="8" fill="#a855f7"/>
      <text x="30" y="95" fill="#d1d5db">Volumes, networks, Compose</text>
    </g>

    <g transform="translate(0 430)">
      <rect x="0" y="0" width="108" height="34" rx="17" fill="none" stroke="#38bdf8" stroke-width="2"/>
      <text x="24" y="23" fill="#93c5fd" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">docker ps</text>

      <rect x="124" y="0" width="138" height="34" rx="17" fill="none" stroke="#22c55e" stroke-width="2"/>
      <text x="147" y="23" fill="#86efac" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">docker build</text>

      <rect x="278" y="0" width="152" height="34" rx="17" fill="none" stroke="#a855f7" stroke-width="2"/>
      <text x="299" y="23" fill="#d8b4fe" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">docker compose</text>
    </g>
  </g>

  <text x="422" y="608" fill="#6b7280" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">devops-daily.com/games/docker-terminal-simulator</text>
</svg>
