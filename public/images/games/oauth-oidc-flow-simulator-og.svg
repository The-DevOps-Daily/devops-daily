<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">OAuth/OIDC Flow Simulator</title>
  <desc id="desc">Visualize authorization code with PKCE, tokens, scopes, and common auth errors.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="0.58" stop-color="#11162a"/>
      <stop offset="1" stop-color="#0f2a24"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#262626"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#93c5fd" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <path d="M0 570H1200V630H0Z" fill="#0b1220" opacity="0.72"/>
  <circle cx="116" cy="98" r="144" fill="#0f766e" opacity="0.12"/>
  <circle cx="1076" cy="504" r="178" fill="#10b981" opacity="0.10"/>
  <circle cx="890" cy="127" r="105" fill="#334155" opacity="0.24"/>

  <g transform="translate(80 138)">
    <rect x="0" y="0" width="595" height="392" rx="12" fill="url(#terminal)" stroke="#475569" stroke-width="2"/>
    <rect x="0" y="0" width="595" height="40" rx="12" fill="#333331"/>
    <path d="M0 24C0 10.745 10.745 0 24 0H571C584.255 0 595 10.745 595 24V40H0V24Z" fill="#333331"/>
    <circle cx="26" cy="20" r="7" fill="#ff5f57"/>
    <circle cx="50" cy="20" r="7" fill="#ffbd2e"/>
    <circle cx="74" cy="20" r="7" fill="#28c840"/>
    <text x="204" y="26" fill="#a3a3a3" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15">oauth-message.log</text>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">
      <text x="22" y="76" fill="#22c55e">GET /authorize?</text>
      <text x="42" y="104" fill="#d4d4d4">response_type=code</text>
      <text x="42" y="132" fill="#d4d4d4">scope=openid profile email</text>
      <text x="42" y="160" fill="#d4d4d4">state=s4f3_csrf</text>
      <text x="42" y="188" fill="#d4d4d4">code_challenge=SHA256(verifier)</text>

      <text x="22" y="236" fill="#22c55e">POST /oauth/token</text>
      <text x="42" y="264" fill="#d4d4d4">grant_type=authorization_code</text>
      <text x="42" y="292" fill="#d4d4d4">code=SplxlOBeZQQYbYS6WxSbIA</text>
      <text x="42" y="320" fill="#d4d4d4">code_verifier=plain_random_secret</text>

      <text x="22" y="366" fill="#38bdf8">id_token + access_token + refresh_token</text>
    </g>
  </g>

  <g transform="translate(710 78)">
    <rect x="139" y="0" width="86" height="86" rx="20" fill="#0e2d29" stroke="#10b981" stroke-opacity="0.5"/>
    <g transform="translate(182 43)" fill="none" stroke="#34d399" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
      <path d="M-22 2c0-20 14-31 22-31S22-18 22 2c0 18-22 31-22 31S-22 20-22 2Z"/>
      <path d="M-8 1l7 7 14-17"/>
    </g>

    <text x="0" y="158" fill="url(#titleGradient)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800">OAuth/OIDC</text>
    <text x="0" y="214" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800">Flow Simulator</text>
    <text x="2" y="256" fill="#9ca3af" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22">Understand auth code, PKCE, tokens</text>

    <g transform="translate(0 300)" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">
      <circle cx="10" cy="8" r="8" fill="#38bdf8"/>
      <text x="30" y="15" fill="#d1d5db">Browser, app, auth server, API</text>

      <circle cx="10" cy="48" r="8" fill="#22c55e"/>
      <text x="30" y="55" fill="#d1d5db">ID, access, refresh tokens</text>

      <circle cx="10" cy="88" r="8" fill="#f97316"/>
      <text x="30" y="95" fill="#d1d5db">Redirect and scope failure modes</text>
    </g>

    <g transform="translate(0 426)">
      <rect x="0" y="0" width="86" height="34" rx="17" fill="none" stroke="#38bdf8" stroke-width="2"/>
      <text x="21" y="23" fill="#93c5fd" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">PKCE</text>

      <rect x="102" y="0" width="106" height="34" rx="17" fill="none" stroke="#22c55e" stroke-width="2"/>
      <text x="125" y="23" fill="#86efac" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">tokens</text>

      <rect x="224" y="0" width="106" height="34" rx="17" fill="none" stroke="#f97316" stroke-width="2"/>
      <text x="250" y="23" fill="#fdba74" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">scopes</text>
    </g>
  </g>

  <text x="396" y="608" fill="#6b7280" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">devops-daily.com/games/oauth-oidc-flow-simulator</text>
</svg>
